<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980" role="img" aria-labelledby="title desc">
  <title id="title">Database review sanitizado</title>
  <desc id="desc">Resumo visual sem dados sensiveis do banco SQLite da plataforma Knowledge INPE.</desc>
  <rect width="1440" height="980" fill="#f5f2ea"/>
  <rect x="72" y="70" width="1296" height="840" rx="28" fill="#ffffff" stroke="#d9d4c8" stroke-width="2"/>
  <text x="112" y="134" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700">Database review sanitizado</text>
  <text x="112" y="172" fill="#5f6673" font-family="Arial, Helvetica, sans-serif" font-size="18">Gerado em 2026-05-14 para auditoria final. Sem e-mails, senhas, tokens ou dados pessoais.</text>

  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="112" y="230" width="366" height="150" rx="18" fill="#f9fafb" stroke="#d7dde6"/>
    <text x="142" y="277" fill="#0f766e" font-size="18" font-weight="700">Usuarios ADMIN</text>
    <text x="142" y="340" fill="#111827" font-size="58" font-weight="700">2</text>

    <rect x="536" y="230" width="366" height="150" rx="18" fill="#f9fafb" stroke="#d7dde6"/>
    <text x="566" y="277" fill="#0f766e" font-size="18" font-weight="700">Usuarios pseudo/teste</text>
    <text x="566" y="340" fill="#111827" font-size="58" font-weight="700">0</text>

    <rect x="960" y="230" width="366" height="150" rx="18" fill="#f9fafb" stroke="#d7dde6"/>
    <text x="990" y="277" fill="#0f766e" font-size="18" font-weight="700">Cursos publicados</text>
    <text x="990" y="340" fill="#111827" font-size="58" font-weight="700">1</text>

    <rect x="112" y="426" width="366" height="150" rx="18" fill="#f9fafb" stroke="#d7dde6"/>
    <text x="142" y="473" fill="#0f766e" font-size="18" font-weight="700">Cursos de teste</text>
    <text x="142" y="536" fill="#111827" font-size="58" font-weight="700">0</text>

    <rect x="536" y="426" width="366" height="150" rx="18" fill="#f9fafb" stroke="#d7dde6"/>
    <text x="566" y="473" fill="#0f766e" font-size="18" font-weight="700">Imagens de curso</text>
    <text x="566" y="536" fill="#111827" font-size="58" font-weight="700">1</text>

    <rect x="960" y="426" width="366" height="150" rx="18" fill="#f9fafb" stroke="#d7dde6"/>
    <text x="990" y="473" fill="#0f766e" font-size="18" font-weight="700">Integridade SQLite</text>
    <text x="990" y="536" fill="#111827" font-size="58" font-weight="700">ok</text>

    <rect x="112" y="632" width="1214" height="168" rx="18" fill="#101827"/>
    <text x="148" y="684" fill="#e5e7eb" font-size="22" font-weight="700">Checks executados</text>
    <text x="148" y="728" fill="#cbd5e1" font-size="18">- PRAGMA integrity_check: ok</text>
    <text x="148" y="760" fill="#cbd5e1" font-size="18">- PRAGMA foreign_key_check: sem violacoes</text>
    <text x="148" y="792" fill="#cbd5e1" font-size="18">- Tabelas de teste limpas: usuarios, sessoes, notificacoes, filas e engajamentos</text>
  </g>
</svg>
